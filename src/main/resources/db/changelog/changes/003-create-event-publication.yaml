databaseChangeLog:
  - changeSet:
      id: 003-create-event-publication
      author: mpoborowski
      changes:
        - createTable:
            tableName: event_publication
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: event_type
                  type: varchar(512)
                  constraints:
                    nullable: false

              - column:
                  name: listener_id
                  type: varchar(512)
                  constraints:
                    nullable: false

              - column:
                  name: publication_date
                  type: timestamp with time zone
                  constraints:
                    nullable: false

              - column:
                  name: completion_date
                  type: timestamp with time zone

              - column:
                  name: serialized_event
                  type: text
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: varchar(100)
                  constraints:
                    nullable: false

              - column:
                  name: completion_attempts
                  type: integer
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false

              - column:
                  name: last_resubmission_date
                  type: timestamp with time zone

        - createIndex:
            tableName: event_publication
            indexName: idx_event_publication_status
            columns:
              - column:
                  name: status

        - createIndex:
            tableName: event_publication
            indexName: idx_event_publication_publication_date
            columns:
              - column:
                  name: publication_date

        - createIndex:
            tableName: event_publication
            indexName: idx_event_publication_listener_id
            columns:
              - column:
                  name: listener_id